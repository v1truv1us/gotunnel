# GoReleaser v2 configuration for gotunnel
version: 2

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/gotunnel
    binary: gotunnel
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/johncferguson/gotunnel/internal/observability.ServiceVersion={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

release:
  draft: false
  prerelease: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: gotunnel
    homepage: https://github.com/v1truv1us/gotunnel
    description: "CLI tool for local network tunnel to web applications via .local domains"
    license: MIT
    repository:
      owner: v1truv1us
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_PAT }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "gotunnel"
    caveats: |
      Gotunnel enables .local domain access to local web apps.

      Usage:
        gotunnel serve --port 3000
        gotunnel list

      For more info: https://github.com/v1truv1us/gotunnel
    test: |
      system "#{bin}/gotunnel", "--help"